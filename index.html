<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ElectraLearn — WiFi Multiplayer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@400;700&family=Orbitron:wght@700;900&display=swap');
:root{
  --bg:#06080e;--panel:#0e1520;--panel2:#141d2e;--border:#1a2d48;
  --accent:#00d4ff;--gold:#ffd700;--green:#00ff88;--red:#ff2255;--text:#ddeeff;--muted:#4a6a8a;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;overflow-x:hidden;}
header{padding:12px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:rgba(6,8,14,0.95);position:sticky;top:0;z-index:100;}
.logo{font-family:'Orbitron',monospace;font-size:1.2rem;font-weight:900;letter-spacing:2px}
.logo span{color:var(--accent)}

.screen{display:none;padding:24px;max-width:600px;margin:0 auto}
.screen.active{display:block;animation:fadeIn 0.3s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px;position:relative;overflow:hidden;}
.card h2, .card h3 {margin-bottom:15px; font-family:'Orbitron', sans-serif; font-size:1rem; color:var(--accent)}

.btn{display:block;width:100%;padding:14px;border-radius:8px;border:none;font-weight:700;cursor:pointer;margin-top:10px;font-family:inherit;transition:0.2s;text-align:center;text-decoration:none;}
.btn-primary{background:linear-gradient(135deg, var(--accent), #0088aa);color:#000}
.btn-secondary{background:var(--panel2);border:1px solid var(--border);color:var(--text)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(0,212,255,0.3)}

.net-bar{padding:12px;border-radius:8px;margin-bottom:15px;font-size:.8rem;text-align:center;font-family:'Share Tech Mono',monospace;}
.net-bar.connected{background:rgba(0,255,136,0.1);color:var(--green);border:1px solid var(--green)}
.net-bar.error{background:rgba(255,34,85,0.1);color:var(--red);border:1px solid var(--red)}

.share-url{background:#000;padding:12px;border-radius:8px;font-size:.7rem;word-break:break-all;margin:10px 0;border:1px solid var(--border);color:var(--muted);font-family:'Share Tech Mono';}
#qrWrap{background:#fff;padding:10px;border-radius:10px;width:fit-content;margin:15px auto;box-shadow:0 0 20px rgba(255,255,255,0.1);}

.ans-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
.ans-btn{background:var(--panel2);border:1px solid var(--border);color:#fff;padding:18px;border-radius:10px;cursor:pointer;font-family:'Share Tech Mono';font-size:1.1rem;transition:0.1s}
.ans-btn.correct{background:var(--green);color:#000;border-color:var(--green)}
.ans-btn.wrong{background:var(--red);color:#fff;border-color:var(--red)}

.p-row{background:rgba(255,255,255,0.03);padding:10px;border-radius:8px;margin-bottom:5px;border:1px solid var(--border);font-size:0.9rem;}
</style>
</head>
<body>

<header>
    <div class="logo">ELECTRA<span>LEARN</span></div>
    <div id="statusPill" style="font-size: 0.7rem; color:var(--muted)">● Offline</div>
</header>

<div class="screen active" id="lobby">
    <div class="card" style="text-align: center; padding: 40px 20px;">
        <h1 style="font-family:'Orbitron'; margin-bottom: 10px;">COMPONENT BATTLE</h1>
        <p style="color:var(--muted); font-size: 0.8rem; margin-bottom: 30px;">WiFi Multiplayer & Solo Training</p>
        
        <button class="btn btn-primary" onclick="startSolo()">🎮 SOLO PRACTICE</button>
        <button class="btn btn-secondary" onclick="showScreen('setup')">📡 HOST MULTIPLAYER</button>
        
        <div style="margin:25px 0; display:flex; align-items:center; gap:10px;">
            <div style="flex:1; height:1px; background:var(--border)"></div>
            <span style="font-size:0.7rem; color:var(--muted)">OR JOIN ROOM</span>
            <div style="flex:1; height:1px; background:var(--border)"></div>
        </div>

        <input id="joinName" placeholder="Enter Your Name" style="width:100%; padding:12px; margin-bottom:10px; background:#000; color:#fff; border:1px solid var(--border); border-radius:8px;">
        <button class="btn btn-secondary" onclick="joinRoom()">JOIN USING HOST LINK</button>
        <p style="font-size:0.6rem; color:var(--muted); margin-top:8px;">To join, click the specific link shared by your instructor.</p>
    </div>
</div>

<div class="screen" id="setup">
    <div class="card">
        <h3>Host Settings</h3>
        <label style="font-size:0.7rem; color:var(--muted)">INSTRUCTOR NAME</label>
        <input id="hostName" placeholder="e.g. Mr. Prasad" style="width:100%; padding:12px; margin:8px 0 20px; background:#000; color:#fff; border:1px solid var(--border); border-radius:8px;">
        
        <label style="font-size:0.7rem; color:var(--muted)">GAME TYPE</label>
        <select id="gameType" style="width:100%; padding:12px; margin:8px 0 20px; background:#000; color:#fff; border:1px solid var(--border); border-radius:8px;">
            <option value="drill">Resistor Color Drill (4-Band)</option>
            <option value="smd">SMD Code Quiz</option>
        </select>
        
        <button class="btn btn-primary" onclick="createRoom()">CREATE ROOM</button>
        <button class="btn btn-secondary" onclick="showScreen('lobby')">BACK</button>
    </div>
</div>

<div class="screen" id="waiting">
    <div id="netStatus" class="net-bar">Handshaking with Server...</div>
    <div class="card" style="text-align:center">
        <h3 id="waitTitle">Room Ready</h3>
        <div class="share-url" id="shareUrl">Link Generating...</div>
        <div id="qrWrap"></div>
        <div id="playerList" style="text-align:left; margin-top:15px"></div>
        <button class="btn btn-primary" id="startBtn" style="display:none" onclick="hostStart()">START GAME NOW</button>
        <button class="btn btn-secondary" style="margin-top:20px" onclick="location.reload()">CLOSE ROOM</button>
    </div>
</div>

<div class="screen" id="game">
    <div class="card" style="text-align:center">
        <div style="display:flex; justify-content:space-between; font-size:0.7rem; color:var(--muted); margin-bottom:15px;">
            <span id="qCount">Question 1/5</span>
            <span id="gameModeDisplay">MULTIPLAYER</span>
        </div>
        <h3 id="qTitle" style="font-size:1.2rem; min-height:3em; display:flex; align-items:center; justify-content:center;">Identify Value</h3>
        <div id="compArea"></div>
        <div class="ans-grid" id="ansGrid"></div>
    </div>
</div>

<script>
const COLORS = [
    {n:'Black',h:'#000',v:0}, {n:'Brown',h:'#8B4513',v:1}, {n:'Red',h:'#FF0000',v:2},
    {n:'Orange',h:'#FFA500',v:3}, {n:'Yellow',h:'#FFFF00',v:4}, {n:'Green',h:'#008000',v:5},
    {n:'Blue',h:'#0000FF',v:6}, {n:'Violet',h:'#EE82EE',v:7}, {n:'Grey',h:'#808080',v:8}, {n:'White',h:'#FFFFFF',v:9}
];

let peer=null, hostConn=null, guestConns=[], isHost=false, isSolo=false;
let players={}, questions=[], curIdx=0, myName='';

function showScreen(id){ 
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// 1. SOLO MODE
function startSolo(){
    isSolo = true; isHost = false;
    document.getElementById('gameModeDisplay').innerText = "SOLO PRACTICE";
    questions = generateQuestions();
    showScreen('game');
    renderQ();
}

// 2. MULTIPLAYER HOST
function createRoom(){
    myName = document.getElementById('hostName').value || "Instructor";
    isHost = true; isSolo = false;
    document.getElementById('gameModeDisplay').innerText = "HOSTING";
    showScreen('waiting');
    
    peer = new Peer(null, {secure: true, debug: 1});
    
    peer.on('open', (id)=>{
        document.getElementById('netStatus').className="net-bar connected";
        document.getElementById('netStatus').innerText="ONLINE: Waiting for Students";
        document.getElementById('statusPill').innerText = "● Hosting";
        
        const url = window.location.origin + window.location.pathname + '#' + id;
        document.getElementById('shareUrl').innerText = url;
        document.getElementById('qrWrap').innerHTML = '';
        new QRCode(document.getElementById('qrWrap'), {text: url, width:140, height:140});
        document.getElementById('startBtn').style.display='block';
        players[id] = myName;
        updatePlayerUI();
    });

    peer.on('connection', (conn)=>{
        guestConns.push(conn);
        conn.on('open', () => {
            // Send current player list immediately upon connection
            conn.send({type:'sync', players});
        });
        conn.on('data', (data)=>{
            if(data.type==='join'){
                players[conn.peer] = data.name;
                updatePlayerUI();
                broadcast({type:'sync', players});
            }
        });
    });
}

// 3. MULTIPLAYER JOIN
function joinRoom(){
    const hashId = window.location.hash.replace('#','');
    if(!hashId) return alert("Error: No Room ID found in link. Please use the host's specific link.");
    
    myName = document.getElementById('joinName').value || "Student";
    isHost = false; isSolo = false;
    document.getElementById('gameModeDisplay').innerText = "MULTIPLAYER";
    showScreen('waiting');
    document.getElementById('waitTitle').innerText = "Joining Room...";
    
    peer = new Peer(null, {secure: true});
    peer.on('open', (myId)=>{
        hostConn = peer.connect(hashId, {reliable: true});
        
        hostConn.on('open', ()=>{
            document.getElementById('netStatus').className="net-bar connected";
            document.getElementById('netStatus').innerText="CONNECTED: Waiting for Start";
            document.getElementById('statusPill').innerText = "● Connected";
            hostConn.send({type:'join', name: myName});
        });

        hostConn.on('data', (data)=>{
            if(data.type==='sync'){ players = data.players; updatePlayerUI(); }
            if(data.type==='start'){ questions = data.qs; startGame(); }
            if(data.type==='next'){ curIdx = data.idx; renderQ(); }
        });

        hostConn.on('close', () => {
            alert("Host disconnected.");
            location.reload();
        });
    });
}

// 4. GAME ENGINE
function generateQuestions(){
    let qs = [];
    const type = document.getElementById('gameType').value;
    for(let i=0; i<5; i++){
        if(type === 'drill'){
            const c = COLORS[Math.floor(Math.random()*10)];
            qs.push({
                q: `Identify the value for color: ${c.n.toUpperCase()}`,
                a: c.v,
                opts: shuffle([c.v, (c.v+1)%10, (c.v+2)%10, (c.v+3)%10])
            });
        } else {
            const val = [10, 22, 47, 100, 220, 470][Math.floor(Math.random()*6)];
            qs.push({
                q: `What is the resistance for SMD Code: ${val}0 ?`,
                a: val + " Ω",
                opts: shuffle([val + " Ω", (val*10) + " Ω", (val/10) + " Ω", "47 Ω"])
            });
        }
    }
    return qs;
}

function hostStart(){
    questions = generateQuestions();
    broadcast({type:'start', qs: questions});
    startGame();
}

function startGame(){ curIdx = 0; showScreen('game'); renderQ(); }

function renderQ(){
    const q = questions[curIdx];
    document.getElementById('qCount').innerText = `Question ${curIdx+1}/${questions.length}`;
    document.getElementById('qTitle').innerText = q.q;
    
    const grid = document.getElementById('ansGrid');
    grid.innerHTML = "";
    
    q.opts.forEach(opt => {
        const b = document.createElement('button');
        b.className = 'ans-btn';
        b.innerText = opt;
        b.onclick = () => {
            if(opt === q.a){
                b.classList.add('correct');
                setTimeout(() => {
                    curIdx++;
                    if(curIdx < questions.length){
                        if(isHost) broadcast({type:'next', idx: curIdx});
                        renderQ();
                    } else {
                        alert("Game Completed!");
                        location.reload();
                    }
                }, 800);
            } else {
                b.classList.add('wrong');
                setTimeout(() => b.classList.remove('wrong'), 500);
            }
        };
        grid.appendChild(b);
    });
}

// HELPER FUNCTIONS
function broadcast(data){ guestConns.forEach(c => { if(c.open) c.send(data); }); }
function updatePlayerUI(){
    document.getElementById('playerList').innerHTML = "<strong>PLAYERS IN ROOM:</strong><br>" + 
        Object.values(players).map(p => `<div class="p-row">${p}</div>`).join("");
}
function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

// Detect Link on Load
window.onload = () => {
    if(window.location.hash) {
        document.querySelector('h1').innerText = "ROOM LINK DETECTED";
    }
}
</script>
</body>
</html>
