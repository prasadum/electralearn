<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ElectraLearn — WiFi Multiplayer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700;900&family=Orbitron:wght@400;700;900&display=swap');
:root{
  --bg:#06080e;--panel:#0e1520;--panel2:#141d2e;--border:#1a2d48;
  --accent:#00d4ff;--a2:#ff5500;--gold:#ffd700;--green:#00ff88;
  --red:#ff2255;--purple:#c084fc;--text:#ddeeff;--muted:#4a6a8a;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;overflow-x:hidden;}

header{padding:12px 24px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);background:rgba(6,8,14,.97);position:sticky;top:0;z-index:200;}
.logo{font-family:'Orbitron',monospace;font-size:1.2rem;font-weight:900;letter-spacing:3px}
.logo span{color:var(--accent)}

.screen{display:none;padding:24px;max-width:800px;margin:0 auto}
.screen.active{display:block;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* LOBBY UI */
#lobby{text-align:center;padding-top:40px}
.lcard{background:var(--panel);border:2px solid var(--border);border-radius:14px;padding:22px;cursor:pointer;transition:.2s;margin-bottom:15px}
.lcard:hover{border-color:var(--accent);transform:translateY(-3px)}

.join-box{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:24px;text-align:left}
.field{margin-bottom:15px}
.field label{display:block;font-size:.7rem;color:var(--muted);margin-bottom:5px;text-transform:uppercase}
.field input{width:100%;background:var(--panel2);border:1px solid var(--border);color:#fff;padding:12px;border-radius:8px;outline:none}

.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 24px;border-radius:8px;border:none;font-weight:700;cursor:pointer;width:100%}
.btn-primary{background:var(--accent);color:#000}

/* STATUS BAR */
.net-bar{display:flex;align-items:center;gap:10px;padding:12px;border-radius:8px;margin-bottom:15px;font-size:.8rem}
.net-bar.connecting{background:rgba(255,215,0,.1);color:var(--gold)}
.net-bar.connected{background:rgba(0,255,136,.1);color:var(--green)}
.dot{width:10px;height:10px;border-radius:50%;background:currentColor}

#qrWrap{background:#fff;padding:10px;border-radius:10px;width:fit-content;margin:20px auto;min-height:120px}
.share-url-box{background:var(--panel2);padding:10px;border-radius:5px;font-size:.7rem;word-break:break-all;margin:10px 0;border:1px solid var(--border)}

/* PLAYER ROW */
.p-row{background:var(--panel2);padding:10px;border-radius:8px;margin-bottom:5px;border:1px solid var(--border)}
</style>
</head>
<body>

<header><div class="logo">ELECTRA<span>LEARN</span></div></header>

<div class="screen active" id="lobby">
  <h1>WIFI MULTIPLAYER</h1>
  <div style="margin:20px 0">
    <div class="lcard" onclick="showSetup()"><h3>HOST A ROOM</h3><p>Create a game for your students</p></div>
    <div class="join-box">
        <h3>JOIN A ROOM</h3>
        <div class="field"><label>Your Name</label><input id="joinName" placeholder="Enter your name"></div>
        <div class="field"><label>Room ID</label><input id="manualRoomId" placeholder="Paste ID from host link"></div>
        <button class="btn btn-primary" onclick="joinRoom()">JOIN GAME</button>
    </div>
  </div>
</div>

<div class="screen" id="setup">
  <div class="join-box">
    <h2>Host Setup</h2>
    <div class="field"><label>Your Name</label><input id="hostName" placeholder="Instructor Name"></div>
    <button class="btn btn-primary" onclick="createRoom()">CREATE ROOM</button>
  </div>
</div>

<div class="screen" id="waiting">
  <div class="net-bar connecting" id="netBar"><div class="dot"></div><span id="netMsg">Connecting...</span></div>
  <div style="text-align:center">
    <p style="font-size:.8rem;color:var(--muted)">STUDENTS MUST USE THIS LINK:</p>
    <div class="share-url-box" id="shareUrl">Generating...</div>
    <div id="qrWrap"></div>
    <div id="playerList" style="margin-top:20px;text-align:left"></div>
    <button class="btn btn-primary" id="startBtn" style="display:none;margin-top:20px">START GAME</button>
  </div>
</div>

<script>
let peer = null;
let guestConns = [];
let hostConn = null;
let players = {};

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function setNet(status, msg) {
    const bar = document.getElementById('netBar');
    bar.className = 'net-bar ' + status;
    document.getElementById('netMsg').textContent = msg;
}

function createRoom() {
    showScreen('waiting');
    // SECURE: true is required for GitHub Pages
    peer = new Peer(undefined, { secure: true, debug: 1 });

    peer.on('open', (id) => {
        setNet('connected', 'Room Online');
        const url = window.location.origin + window.location.pathname + '#' + id;
        document.getElementById('shareUrl').textContent = url;
        document.getElementById('qrWrap').innerHTML = '';
        new QRCode(document.getElementById('qrWrap'), {text: url, width: 140, height: 140});
        document.getElementById('startBtn').style.display = 'block';
    });

    peer.on('connection', (conn) => {
        guestConns.push(conn);
        conn.on('data', (data) => {
            if(data.type === 'join') {
                players[data.id] = data.name;
                updateList();
                broadcast({type: 'sync', players});
            }
        });
    });
}

function joinRoom() {
    const name = document.getElementById('joinName').value || 'Student';
    const targetId = document.getElementById('manualRoomId').value || window.location.hash.replace('#', '');
    
    if(!targetId) { alert("Need Room ID!"); return; }

    showScreen('waiting');
    setNet('connecting', 'Finding Host...');

    peer = new Peer(undefined, { secure: true });

    peer.on('open', (myId) => {
        const conn = peer.connect(targetId);
        hostConn = conn;
        conn.on('open', () => {
            setNet('connected', 'Joined!');
            conn.send({type: 'join', name: name, id: myId});
        });
        conn.on('data', (data) => {
            if(data.type === 'sync') {
                players = data.players;
                updateList();
            }
        });
    });
}

function updateList() {
    document.getElementById('playerList').innerHTML = '<strong>PLAYERS:</strong><br>' + 
        Object.values(players).map(p => `<div class="p-row">${p}</div>`).join('');
}

function broadcast(data) { guestConns.forEach(c => c.send(data)); }
function showSetup() { showScreen('setup'); }

// Auto-detect Room ID from URL Link
window.onload = () => {
    if(window.location.hash) {
        document.getElementById('manualRoomId').value = window.location.hash.replace('#', '');
    }
}
</script>
</body>
</html>
