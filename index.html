<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ElectraLearn — WiFi Multiplayer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@400;700&family=Orbitron:wght@700;900&display=swap');
:root{
  --bg:#06080e;--panel:#0e1520;--border:#1a2d48;
  --accent:#00d4ff;--gold:#ffd700;--green:#00ff88;
  --red:#ff2255;--text:#ddeeff;--muted:#4a6a8a;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;}
header{padding:12px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.logo{font-family:'Orbitron',monospace;font-size:1.2rem;font-weight:900;}
.logo span{color:var(--accent)}

.screen{display:none;padding:24px;max-width:600px;margin:0 auto}
.screen.active{display:block;}

.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px}
.btn{display:block;width:100%;padding:14px;border-radius:8px;border:none;font-weight:700;cursor:pointer;margin-top:10px;font-family:inherit;}
.btn-primary{background:var(--accent);color:#000}
.btn-secondary{background:transparent;border:1px solid var(--border);color:var(--text)}

.net-bar{padding:12px;border-radius:8px;margin-bottom:15px;font-size:.8rem;text-align:center}
.net-bar.connected{background:rgba(0,255,136,.1);color:var(--green)}
.net-bar.error{background:rgba(255,34,85,.1);color:var(--red)}

.share-url{background:#000;padding:10px;border-radius:5px;font-size:.7rem;word-break:break-all;margin:10px 0;border:1px solid var(--border);color:var(--muted)}
#qrWrap{background:#fff;padding:10px;border-radius:10px;width:fit-content;margin:15px auto;}

.ans-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px}
.ans-btn{background:rgba(255,255,255,0.05);border:1px solid var(--border);color:#fff;padding:15px;border-radius:8px;cursor:pointer}
.ans-btn.correct{background:var(--green);color:#000}
.ans-btn.wrong{background:var(--red);color:#fff}
</style>
</head>
<body>

<header><div class="logo">ELECTRA<span>LEARN</span></div></header>

<div class="screen active" id="lobby">
  <div class="card">
    <h2>WiFi Multiplayer</h2>
    <button class="btn btn-primary" onclick="showSetup()">HOST GAME</button>
    <div style="margin:20px 0; border-top:1px solid var(--border)"></div>
    <input id="joinName" placeholder="Your Name" style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:#fff; border:1px solid var(--border)">
    <button class="btn btn-secondary" onclick="joinRoom()">JOIN USING LINK ABOVE</button>
  </div>
</div>

<div class="screen" id="setup">
  <div class="card">
    <h3>Game Settings</h3>
    <select id="gameType" style="width:100%; padding:10px; margin:10px 0; background:#000; color:#fff;">
        <option value="drill">Color Drill (4-Band)</option>
        <option value="smd">SMD Resistor Codes</option>
    </select>
    <button class="btn btn-primary" onclick="createRoom()">CREATE ROOM</button>
  </div>
</div>

<div class="screen" id="waiting">
  <div id="netStatus" class="net-bar">Initialising Peer...</div>
  <div class="card" style="text-align:center">
    <div class="share-url" id="shareUrl">Generating Link...</div>
    <div id="qrWrap"></div>
    <div id="playerList" style="text-align:left; margin-top:15px"></div>
    <button class="btn btn-primary" id="startBtn" style="display:none" onclick="hostStart()">START GAME</button>
  </div>
</div>

<div class="screen" id="game">
  <div class="card" style="text-align:center">
    <h3 id="qTitle">Identify Value</h3>
    <div id="compArea" style="margin:20px 0; min-height:80px"></div>
    <div class="ans-grid" id="ansGrid"></div>
  </div>
</div>

<script>
// Data for Electrician Quiz
const COLORS = [
    {n:'Black',h:'#000',v:0}, {n:'Brown',h:'#8B4513',v:1}, {n:'Red',h:'#FF0000',v:2},
    {n:'Orange',h:'#FFA500',v:3}, {n:'Yellow',h:'#FFFF00',v:4}, {n:'Green',h:'#008000',v:5},
    {n:'Blue',h:'#0000FF',v:6}, {n:'Violet',h:'#EE82EE',v:7}, {n:'Grey',h:'#808080',v:8}, {n:'White',h:'#FFFFFF',v:9}
];

let peer=null, hostConn=null, guestConns=[], isHost=false, players={}, questions=[], curIdx=0;

function showScreen(id){ 
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function updatePlayers(){
    document.getElementById('playerList').innerHTML = "<b>Joined:</b> " + Object.values(players).join(", ");
}

// HOST LOGIC
function createRoom(){
    isHost = true; showScreen('waiting');
    peer = new Peer(null, {secure: true, debug: 1});
    
    peer.on('open', (id)=>{
        document.getElementById('netStatus').className="net-bar connected";
        document.getElementById('netStatus').innerText="Room Online";
        const url = window.location.origin + window.location.pathname + '#' + id;
        document.getElementById('shareUrl').innerText = url;
        new QRCode(document.getElementById('qrWrap'), {text: url, width:128, height:128});
        document.getElementById('startBtn').style.display='block';
    });

    peer.on('connection', (conn)=>{
        guestConns.push(conn);
        conn.on('data', (data)=>{
            if(data.type==='join'){
                players[conn.peer] = data.name;
                updatePlayers();
                broadcast({type:'sync', players});
            }
        });
    });
}

// JOIN LOGIC
function joinRoom(){
    const id = window.location.hash.replace('#','');
    if(!id) return alert("Please click the link from the host!");
    const name = document.getElementById('joinName').value || "Student";
    showScreen('waiting');
    
    peer = new Peer(null, {secure: true});
    peer.on('open', (myId)=>{
        hostConn = peer.connect(id);
        hostConn.on('open', ()=>{
            document.getElementById('netStatus').className="net-bar connected";
            document.getElementById('netStatus').innerText="Connected to Host";
            hostConn.send({type:'join', name: name});
        });
        hostConn.on('data', (data)=>{
            if(data.type==='sync'){ players = data.players; updatePlayers(); }
            if(data.type==='start'){ questions=data.qs; startGame(); }
            if(data.type==='next'){ curIdx=data.idx; renderQ(); }
        });
    });
}

function broadcast(data){ guestConns.forEach(c=>c.send(data)); }

function hostStart(){
    // Generate 5 questions
    questions = [];
    for(let i=0; i<5; i++){
        const c = COLORS[Math.floor(Math.random()*10)];
        questions.push({q: `What is the value of ${c.n}?`, a: c.v, opts: [c.v, (c.v+1)%10, (c.v+2)%10, (c.v+3)%10].sort(()=>Math.random()-.5)});
    }
    broadcast({type:'start', qs: questions});
    startGame();
}

function startGame(){ curIdx=0; showScreen('game'); renderQ(); }

function renderQ(){
    const q = questions[curIdx];
    document.getElementById('qTitle').innerText = q.q;
    const grid = document.getElementById('ansGrid');
    grid.innerHTML = "";
    q.opts.forEach(opt=>{
        const b = document.createElement('button');
        b.className='ans-btn';
        b.innerText = opt;
        b.onclick = ()=>{
            if(opt === q.a) b.classList.add('correct');
            else b.classList.add('wrong');
            setTimeout(()=>{
                if(isHost){ curIdx++; if(curIdx<5){ broadcast({type:'next', idx:curIdx}); renderQ(); } }
            }, 1000);
        };
        grid.appendChild(b);
    });
}

function showSetup(){ showScreen('setup'); }
</script>
</body>
</html>
